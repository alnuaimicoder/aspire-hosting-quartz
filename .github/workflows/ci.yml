name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: ['8.0.x', '9.0.x']

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET ${{ matrix.dotnet-version }}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}

    - name: Restore dependencies
      run: dotnet restore aspire-hosting-quartz.slnx

    - name: Build
      run: dotnet build aspire-hosting-quartz.slnx --no-restore --configuration Release

    - name: Test
      run: dotnet test aspire-hosting-quartz.slnx --no-build --configuration Release --verbosity normal
      continue-on-error: true  # Tests not implemented yet

    - name: Pack
      run: dotnet pack aspire-hosting-quartz.slnx --no-build --configuration Release --output ./artifacts

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages-${{ matrix.dotnet-version }}
        path: ./artifacts/*.nupkg

  validate-samples:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Build samples
      run: dotnet build samples/QuartzSample.sln --configuration Release
