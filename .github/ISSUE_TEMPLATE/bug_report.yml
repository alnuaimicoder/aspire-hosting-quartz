name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what you see!
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Configure AppHost with '...'
        2. Enqueue job with '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Library Version
      description: What version of CommunityToolkit.Aspire.Quartz are you using?
      placeholder: "1.0.0"
    validations:
      required: true

  - type: dropdown
    id: dotnet-version
    attributes:
      label: .NET Version
      description: What version of .NET are you using?
      options:
        - .NET 8.0
        - .NET 9.0
        - .NET 10.0
        - Other (specify in additional context)
    validations:
      required: true

  - type: dropdown
    id: aspire-version
    attributes:
      label: Aspire Version
      description: What version of .NET Aspire are you using?
      options:
        - 9.0.0
        - 9.1.0
        - Other (specify in additional context)
    validations:
      required: true

  - type: dropdown
    id: database
    attributes:
      label: Database Provider
      description: Which database are you using?
      options:
        - SQL Server
        - PostgreSQL
        - Other (specify in additional context)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please copy and paste any relevant log output.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
