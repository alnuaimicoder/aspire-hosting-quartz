name: Question
description: Ask a question about usage or implementation
title: "[Question]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Have a question? We're here to help!

  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What would you like to know?
      placeholder: How do I...?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Question Area
      description: What is your question about?
      options:
        - Getting Started
        - Configuration
        - Job Enqueuing
        - Job Execution
        - Retry Policies
        - Idempotency
        - Database Setup
        - Observability
        - Troubleshooting
        - Best Practices
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Provide any additional context that might help us answer your question.
      placeholder: I'm trying to... and I've already tried...

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      description: Before asking, please check:
      options:
        - label: I've read the [README](https://github.com/alnuaimicoder/aspire-hosting-quartz/blob/main/README.md)
          required: false
        - label: I've checked the [samples](https://github.com/alnuaimicoder/aspire-hosting-quartz/tree/main/samples)
          required: false
        - label: I've searched existing issues
          required: false
